name: Hourly Story Graph Growth

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      story_now:
        description: "Optional ISO time used to test graph growth"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: echoes-beneath-hourly-story
  cancel-in-progress: false

jobs:
  grow-graph:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Release one new story depth
        env:
          STORY_NOW: ${{ inputs.story_now }}
        run: node scripts/generate-story.mjs

      - name: Commit graph state when changed
        shell: bash
        run: |
          if git diff --quiet -- public/story.generated.json; then
            echo "No new graph depth for this Taipei hour."
            exit 0
          fi

          git config user.name "echoes-beneath-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/story.generated.json
          git commit -m "story: release hourly graph depth"
          git push
